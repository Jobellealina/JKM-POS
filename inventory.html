<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="icon" href="logo.png">
<title>JKM PRIME DIGITAL PRINTS - Inventory</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body {
  font-family: 'Courier New', monospace;
  background: linear-gradient(
    135deg,
    #f9caca,
    #fab8f6,
    #f7c8c8,
    #f7c7fc
  );
  color: #111;
  transition: all 0.3s ease;
  font-size: 13px;
  margin: 0;
  min-height: 100vh;
}

.headerBox{
    background: #9e04c4;;
    color:white;
    border-radius:18px;
    padding:20px;
    margin-bottom:25px;
    display:flex;
    align-items:center;
    gap:15px;
    flex-wrap:wrap;
}

.card{
    border:none;
    border-radius:18px;
    box-shadow:0 10px 30px rgba(0,0,0,0.08);
}

.table thead{
    background:#0d6efd;
    color:white;
}

.low{ background:#ffd6d6 !important; }
.critical{ background:#ffb3b3 !important; }

</style>
</head>

<body>

<div class="container py-3">

<!-- HEADER -->
<div class="headerBox">
    <img src="logo.png" style="height:60px; border-radius: 12px;;" onerror="this.style.display='none'">

    <div>
        <h4 class="m-0">JKM PRIME DIGITAL PRINTS</h4>
        <small>Inventory System</small>
    </div>

    <button class="btn btn-light ms-auto" onclick="goBack()">Dashboard</button>
</div>

<!-- SUMMARY -->
<div class="row g-3 mb-3">

<div class="col-md-4">
<div class="card p-3 text-center">
Total Items
<h3 id="totalProducts">0</h3>
</div>
</div>

<div class="col-md-4">
<div class="card p-3 text-center">
Low Stock
<h3 id="lowStock">0</h3>
</div>
</div>

<div class="col-md-4">
<div class="card p-3 text-center">
Total Value
<h3 id="totalValue">₱0</h3>
</div>
</div>

</div>

<!-- ADD PRODUCT -->
<div class="card p-3 mb-3">

<div class="row g-2">

<div class="col-md-3">
<input id="name" class="form-control" placeholder="Product Name">
</div>

<div class="col-md-2">
<input id="packs" type="number" class="form-control" placeholder="Packs">
</div>

<div class="col-md-2">
<input id="qtyPerPack" type="number" class="form-control" placeholder="Qty/Pack">
</div>

<div class="col-md-3">
<input id="pricePerPack" type="number" class="form-control" placeholder="Price/Pack">
</div>

<div class="col-md-2">
<button class="btn w-100" style="background-color: #9e04c4; color: white;" onclick="addItem()">ADD</button>
</div>

</div>

</div>

<!-- SEARCH -->
<div class="card p-3 mb-3">
<input id="search" class="form-control" placeholder="Search product..." oninput="render()">
</div>

<!-- TABLE -->
<div class="card p-3 table-responsive">

<table class="table text-center align-middle">

<thead>
<tr>
<th>Product</th>
<th>Packs</th>
<th>Qty/Pack</th>
<th>Total Stock</th>
<th>Price/Pack</th>
<th>Total Value</th>
<th>Actions</th>
</tr>
</thead>

<tbody id="list"></tbody>

</table>

</div>

</div>

<!-- EDIT MODAL -->
<div class="modal fade" id="editModal">
<div class="modal-dialog">
<div class="modal-content">

<div class="modal-header">
<h5>Edit Product</h5>
<button class="btn-close"  data-bs-dismiss="modal"></button>
</div>

<div class="modal-body">

<input type="hidden" id="editId">

<input id="editName" class="form-control mb-2" placeholder="Product Name">

<input id="editPacks" type="number" class="form-control mb-2" placeholder="Packs">

<input id="editQtyPerPack" type="number" class="form-control mb-2" placeholder="Qty per Pack">

<input id="editPricePerPack" type="number" class="form-control mb-2" placeholder="Price per Pack">

<hr>

<input id="usedQty" type="number" class="form-control mb-2" placeholder="Used Quantity (Deduct from Qty/Pack)">

</div>

<div class="modal-footer">
<button class="btn" style="background:#da45f1; color:white" data-bs-dismiss="modal">Close</button>
<button class="btn btn-primary" onclick="updateItem()">Save</button>
</div>

</div>
</div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>

const firebaseConfig = {
  databaseURL:"https://jkm-printing-system-default-rtdb.firebaseio.com/"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database().ref("inventory");

let dataCache = {};

function goBack(){
    window.location.href="index.html";
}

/* ADD */
function addItem(){

    let name = document.getElementById("name").value;
    let packs = Number(document.getElementById("packs").value);
    let qtyPerPack = Number(document.getElementById("qtyPerPack").value);
    let pricePerPack = Number(document.getElementById("pricePerPack").value);

    if(!name || isNaN(packs) || isNaN(qtyPerPack) || isNaN(pricePerPack)) return;

    db.push({ name, packs, qtyPerPack, pricePerPack });

    document.getElementById("name").value="";
    document.getElementById("packs").value="";
    document.getElementById("qtyPerPack").value="";
    document.getElementById("pricePerPack").value="";
}

/* LOAD */
db.on("value", snap=>{
    dataCache = snap.val() || {};
    render();
});

/* RENDER */
function render(){

    let search = document.getElementById("search").value.toLowerCase();

    let html = "";
    let totalValue = 0;
    let low = 0;
    let count = 0;

    for(let id in dataCache){

        let p = dataCache[id];

        let packs = Number(p.packs) || 0;
        let qtyPerPack = Number(p.qtyPerPack) || 0;
        let pricePerPack = Number(p.pricePerPack) || 0;

        let totalStock = packs * qtyPerPack;
        let value = packs * pricePerPack;

        if(search && !p.name.toLowerCase().includes(search)) continue;

        count++;
        totalValue += value;

        if(packs <= 2) low++;

        let rowClass = packs <= 2 ? "critical" : (packs <= 5 ? "low" : "");

        html += `
        <tr class="${rowClass}">
            <td>${p.name}</td>
            <td>${packs}</td>
            <td>${qtyPerPack}</td>
            <td>${totalStock}</td>
            <td>${pricePerPack}</td>
            <td>₱${value.toFixed(2)}</td>
            <td>
                <button class="btn btn-sm" style="background:#da45f1; color:white" onclick="openEdit('${id}')">Edit</button>
                <button class="btn btn-sm btn-danger" style=" color:white" onclick="del('${id}')">Delete</button>
            </td>
        </tr>`;
    }

    document.getElementById("list").innerHTML = html;
    document.getElementById("totalProducts").innerText = count;
    document.getElementById("lowStock").innerText = low;
    document.getElementById("totalValue").innerText = "₱" + totalValue.toFixed(2);
}

/* OPEN EDIT */
function openEdit(id){

    let p = dataCache[id];

    document.getElementById("editId").value = id;
    document.getElementById("editName").value = p.name;
    document.getElementById("editPacks").value = p.packs;
    document.getElementById("editQtyPerPack").value = p.qtyPerPack;
    document.getElementById("editPricePerPack").value = p.pricePerPack;

    document.getElementById("usedQty").value = "";

    document.getElementById("editName").placeholder = p.name;
    document.getElementById("editPacks").placeholder = p.packs;
    document.getElementById("editQtyPerPack").placeholder = p.qtyPerPack;
    document.getElementById("editPricePerPack").placeholder = p.pricePerPack;

    new bootstrap.Modal(document.getElementById("editModal")).show();
}

/* UPDATE - DEDUCT QUANTITY ONLY */
function updateItem(){

    let id = document.getElementById("editId").value;

    let name = document.getElementById("editName").value;
    let packs = Number(document.getElementById("editPacks").value);
    let qtyPerPack = Number(document.getElementById("editQtyPerPack").value);
    let pricePerPack = Number(document.getElementById("editPricePerPack").value);

    let usedQty = Number(document.getElementById("usedQty").value) || 0;

    let currentQty = dataCache[id].qtyPerPack || 0;
    let newQty = currentQty - usedQty;

    if(newQty < 0) newQty = 0;

    if(!name || isNaN(packs) || isNaN(qtyPerPack) || isNaN(pricePerPack)) return;

    db.child(id).update({
        name,
        packs,
        qtyPerPack: newQty,
        pricePerPack
    });

    bootstrap.Modal.getInstance(document.getElementById("editModal")).hide();
}

/* DELETE */
function del(id){
    db.child(id).remove();
}

</script>

</body>
</html>
