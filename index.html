<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - JKM PRIME DIGITAL PRINTS</title>
<link rel="icon" href="logo.png">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
<style>
body {
  font-family:'Courier New', monospace;
  background:#eef2f7;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  margin:0;
}
.login-card {
  background:white;
  padding:2.5rem;
  border-radius:10px;
  box-shadow:0 4px 15px rgba(0,0,0,0.2);
  width:380px;
  max-width:90%;
}
.login-card h3 {
  text-align:center;
  margin-bottom:20px;
}
.login-card img {
  display:block;
  margin:0 auto 15px;
  width:60px;
  height:60px;
  border-radius:10px;
}
.btn-login { width:100%; }

/* Password label + eye button on same line */
.password-label-wrapper {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom:5px;
  font-weight:500;
}
.password-wrapper {
  position: relative;
}
.password-wrapper input {
  width:100%;
  padding-right:2.5rem; /* space for eye icon */
}
.password-wrapper i {
  position: absolute;
  top:50%;
  right:10px;
  transform:translateY(-50%);
  cursor:pointer;
  color:#2563eb;
  font-size:1.1rem;
}
</style>
</head>
<body>

<div class="login-card">
  <img src="logo.png" alt="JKM Logo">
  <h3>JKM PRIME DIGITAL PRINTS</h3>

  <div class="mb-3">
    <label for="username" class="form-label">Username</label>
    <input type="text" id="username" class="form-control" placeholder="Enter Username">
  </div>

  <div class="mb-3">
    <div class="password-label-wrapper">
      <label for="password" class="form-label mb-0">Password</label>
      <i class="bi bi-eye" id="togglePass"></i>
    </div>
    <div class="password-wrapper">
      <input type="password" id="password" class="form-control" placeholder="Enter Password">
    </div>
  </div>

  <button class="btn btn-primary btn-login" onclick="login()">Login</button>
</div>

<script>
// Show/Hide Password
const togglePass = document.getElementById('togglePass');
const passwordInput = document.getElementById('password');

togglePass.addEventListener('click', () => {
  if(passwordInput.type === 'password'){
    passwordInput.type = 'text';
    togglePass.classList.remove('bi-eye');
    togglePass.classList.add('bi-eye-slash');
  } else {
    passwordInput.type = 'password';
    togglePass.classList.remove('bi-eye-slash');
    togglePass.classList.add('bi-eye');
  }
});

function login() {
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value.trim();

  const validUsername = 'JKMPRIME';
  const validPassword = 'JKMPRIME@2026';

  if(username === validUsername && password === validPassword){
    localStorage.setItem('isLoggedIn', 'true');
    // Direct redirect without SweetAlert
    window.location.href = 'dashboard.html';
  } else {
    alert('Invalid username or password'); // simple alert on fail
  }
}

// Protect index.html
if(window.location.pathname.includes('index.html')){
  const loggedIn = localStorage.getItem('isLoggedIn');
  if(loggedIn !== 'true'){
    window.location.href = 'login.html';
  }
}
</script>

</body>
</html>
