<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JKM Prime Digital Prints - Project Tracker</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    font-family:Segoe UI;
    background:#eef1f5;
}
.headerBox{
    background:#0f172a;
    color:white;
    border-radius:18px;
    padding:20px;
    margin-bottom:20px;
    display:flex;
    align-items:center;
    gap:15px;
    flex-wrap:wrap;
}
.headerBox img{
    height:60px;
    border-radius:10px;
}
.companyTitle{
    font-size:22px;
    font-weight:700;
}
.companySub{
    font-size:14px;
    opacity:.8;
}
.card{
    border-radius:18px;
    box-shadow:0 10px 30px rgba(0,0,0,.08);
    border:none;
    margin-bottom:20px;
}
.table thead{
    background:#0d6efd;
    color:white;
}
.totalWrapper{
    background:#f8fafc;
    border-radius:14px;
    padding:15px;
    text-align:center;
}
.totalLabel{
    font-size:14px;
    color:#555;
}
.totalValue{
    font-size:26px;
    font-weight:700;
}
.profitValue{
    font-size:26px;
    font-weight:700;
    color:#16a34a;
}
.inputRow input{
    width:100%;
    border:1px solid #ddd;
    border-radius:6px;
    padding:4px;
}
</style>
</head>

<body>

<div class="container py-3">

<div class="headerBox">
    <img src="logo.png" onerror="this.style.display='none'">
    <div>
        <div class="companyTitle">JKM PRIME DIGITAL PRINTS</div>
        <div class="companySub">Printing Services</div>
    </div>
    <button class="btn btn-light" onclick="goMain()">⬅ Main Dashboard</button>
</div>

<!-- Project Materials -->
<div class="card p-3">
<h5>Project Materials</h5>
<div class="row g-3 mb-2">
    <div class="col-md-6">
        <label>Project Name</label>
        <input type="text" id="projectName" class="form-control">
    </div>
    <div class="col-md-6">
        <label>Project Income</label>
        <input type="number" id="income" class="form-control" oninput="computeProfit()">
    </div>
</div>

<div class="table-responsive">
<table class="table table-bordered text-center align-middle">
<thead>
<tr>
<th>Material</th>
<th>Packs</th>
<th>Qty / Pack</th>
<th>Total Qty</th>
<th>Total Price</th>
<th>Add</th>
</tr>
</thead>
<tbody>
<tr class="inputRow">
<td><input type="text" id="material"></td>
<td><input type="number" id="packs"></td>
<td><input type="number" id="qty"></td>
<td>-</td>
<td><input type="number" id="price"></td>
<td><button class="btn btn-primary btn-sm" onclick="addMaterial()">ADD</button></td>
</tr>
</tbody>
<tbody id="tbody"></tbody>
</table>
</div>

<div class="row mt-3 g-3">
<div class="col-md-6">
<div class="totalWrapper">
<div class="totalLabel">TOTAL PROJECT COST</div>
<div class="totalValue">₱ <span id="totalCost">0</span></div>
</div>
</div>
<div class="col-md-6">
<div class="totalWrapper">
<div class="totalLabel">PROJECT PROFIT</div>
<div class="profitValue">₱ <span id="profit">0</span></div>
</div>
</div>
</div>

<div class="mt-3">
<button class="btn btn-success w-100" onclick="saveProject()">SAVE PROJECT</button>
</div>
</div>

<!-- Project History -->
<div class="card p-3">
<h5>Project History</h5>
<table class="table table-striped text-center">
<thead>
<tr>
<th>Date</th>
<th>Project</th>
<th>Cost</th>
<th>Income</th>
<th>Profit</th>
<th>Actions</th>
</tr>
</thead>
<tbody id="history"></tbody>
</table>
</div>

<!-- Modal for Viewing Materials -->
<div class="modal fade" id="viewModal">
<div class="modal-dialog modal-lg">
<div class="modal-content">
<div class="modal-header">
<h5 class="modal-title">Project Materials</h5>
<button class="btn-close" data-bs-dismiss="modal"></button>
</div>
<div class="modal-body">
<table class="table table-bordered text-center">
<thead>
<tr>
<th>Material</th>
<th>Packs</th>
<th>Qty/Pack</th>
<th>Total Qty</th>
<th>Price</th>
</tr>
</thead>
<tbody id="viewTable"></tbody>
</table>
</div>
</div>
</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
    databaseURL:"https://jkm-printing-system-default-rtdb.firebaseio.com/"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let materials = [];
let totalCost = 0;

const tbody = document.getElementById("tbody");
const totalCostSpan = document.getElementById("totalCost");
const profitSpan = document.getElementById("profit");
const history = document.getElementById("history");

function goMain(){
    window.location.href="index.html";
}

function render(){
    let html = "";
    let tc = 0;
    materials.forEach((m,i)=>{
        let totalQty = m.packs * m.qty;
        tc += m.price;
        html += `
        <tr>
            <td>${m.name}</td>
            <td>${m.packs}</td>
            <td>${m.qty}</td>
            <td>${totalQty}</td>
            <td>₱${m.price}</td>
            <td><button class="btn btn-danger btn-sm" onclick="delMaterial(${i})">Delete</button></td>
        </tr>
        `;
    });
    tbody.innerHTML = html;
    totalCost = tc;
    totalCostSpan.innerText = tc;
    computeProfit();
}

function addMaterial(){
    let m = {
        name: document.getElementById("material").value.trim(),
        packs: Number(document.getElementById("packs").value),
        qty: Number(document.getElementById("qty").value),
        price: Number(document.getElementById("price").value)
    };
    if(!m.name || !m.packs || !m.qty || !m.price) return;
    materials.push(m);
    render();
    document.getElementById("material").value="";
    document.getElementById("packs").value="";
    document.getElementById("qty").value="";
    document.getElementById("price").value="";
}

function delMaterial(i){
    materials.splice(i,1);
    render();
}

function computeProfit(){
    let incomeVal = Number(document.getElementById("income").value) || 0;
    profitSpan.innerText = incomeVal - totalCost;
}

function saveProject(){
    let name = document.getElementById("projectName").value.trim();
    let incomeVal = Number(document.getElementById("income").value) || 0;
    let profit = incomeVal - totalCost;
    if(!name) return alert("Project name is required!");

    let date = new Date().toLocaleString();
    let data = {
        date, name, totalCost, incomeVal, profit,
        materials: materials
    };
    db.ref("projects").push(data);
    materials = [];
    render();
    document.getElementById("projectName").value="";
    document.getElementById("income").value="";
}

function loadProjects(){
    db.ref("projects").on("value",(snap)=>{
        let html = "";
        snap.forEach((child)=>{
            let d = child.val();
            // encode JSON to avoid HTML issues
            let materialsEncoded = encodeURIComponent(JSON.stringify(d.materials));
            html += `
            <tr>
                <td>${d.date}</td>
                <td>${d.name}</td>
                <td>₱${d.totalCost}</td>
                <td>₱${d.incomeVal}</td>
                <td>₱${d.profit}</td>
                <td>
                    <button class="btn btn-info btn-sm" onclick="viewProject('${materialsEncoded}')">View</button>
                </td>
            </tr>
            `;
        });
        history.innerHTML = html;
    });
}

function viewProject(materialsEncoded){
    let materials = JSON.parse(decodeURIComponent(materialsEncoded));
    let html = "";
    materials.forEach(m=>{
        html += `
        <tr>
            <td>${m.name}</td>
            <td>${m.packs}</td>
            <td>${m.qty}</td>
            <td>${m.packs*m.qty}</td>
            <td>₱${m.price}</td>
        </tr>
        `;
    });
    document.getElementById("viewTable").innerHTML = html;
    new bootstrap.Modal(document.getElementById("viewModal")).show();
}

loadProjects();
</script>

</body>
</html>
