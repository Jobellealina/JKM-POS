<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quotation Preview - JKM Prime Digital Prints</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
<style>
body{ background:#eef2f7; font-family:Segoe UI; padding:20px; }
.card{ background:white; padding:20px; border-radius:10px; box-shadow:0 4px 12px rgba(0,0,0,.1); max-width:800px; margin:auto; }
.q-title{ font-weight:bold; font-size:22px; }
.q-header{ border-bottom:2px solid #ddd; margin-bottom:15px; padding-bottom:10px; }
.total{ text-align:right; font-weight:bold; font-size:18px; margin-top:10px; }
table{ width:100%; border-collapse:collapse; margin-top:10px; }
th,td{ border:1px solid #ddd; padding:8px; text-align:left; }
</style>
</head>
<body>

<div class="card">
<div class="q-header">
<div class="q-title">JKM PRIME DIGITAL PRINTS</div>
<div>Quotation</div>
</div>

<p>Date: <span id="qDate"></span></p>
<p>Customer: <span id="qCustomer"></span></p>

<table>
<thead>
<tr>
<th>Item</th>
<th>Qty</th>
<th>Unit Price</th>
<th>Total</th>
</tr>
</thead>
<tbody id="qItems"></tbody>
</table>

<div class="total">Total Amount: <span id="qGrand"></span></div>

<p id="qNotes"></p>

<button class="btn btn-success" onclick="window.print()">Print</button>
</div>

<script>
let quotation=JSON.parse(localStorage.getItem("currentQuotation")||"null");
if(quotation){
    document.getElementById("qDate").innerText=quotation.date;
    document.getElementById("qCustomer").innerText=quotation.customer;
    const tbody=document.getElementById("qItems");
    quotation.items.forEach(item=>{
        const tr=document.createElement("tr");
        tr.innerHTML=`<td>${item.name}</td>
<td>${item.qty}</td>
<td>₱${item.price.toFixed(2)}</td>
<td>₱${(item.qty*item.price).toFixed(2)}</td>`;
        tbody.appendChild(tr);
    });
    document.getElementById("qGrand").innerText="₱"+quotation.total.toFixed(2);
    // Fixed notes
    document.getElementById("qNotes").innerText="• At least 50% downpayment is required to confirm the order and start production.\n• Remaining balance must be settled upon delivery/pick-up.";
}else{
    alert("No quotation found!");
}
</script>

</body>
</html>
