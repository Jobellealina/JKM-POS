<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JKM Prime Digital Prints - Inventory</title>
<link rel="icon" href="logo.png">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<style>
body { font-family:'Courier New', monospace; background:#eef2f7; color:#111; transition:.3s; font-size:13px; margin:0; }
body.dark { background:#0f172a; color:white; overflow-x:hidden; }
.sidebar { height:100vh; overflow-y:auto; background:#0f172a; color:white; font-size:13px; width:220px; flex-shrink:0; display:flex; flex-direction:column; padding:1rem; position:fixed; left:0; top:0; transition:.3s; }
.sidebar a { color:white; text-decoration:none; display:flex; align-items:center; gap:8px; padding:10px 15px; cursor:pointer; border-radius:4px; transition:.2s; }
.sidebar a:hover { background:#1e40af; color:#fff; }
.sidebar a.active { background:#3b82f6; color:white; font-weight:600; }
.sidebar .toggle-btn { margin-top:auto; }
.card { border-radius:10px; padding:15px; margin-bottom:15px; transition:.3s; background:white; color:#111; box-shadow:0 2px 8px rgba(0,0,0,0.1); font-size:13px; }
body.dark .card { background:#1e293b; color:white; }
input, select { transition:.3s; background:white; color:#111; font-size:13px; }
body.dark input, body.dark select { background:#334155; color:white; border-color:#475569; }
.btn-professional { width:83px; font-weight:600; border-radius:6px; padding:5px 0; color:white; text-align:center; transition:all .2s; font-size:13px; }
.btn-blue { background:#2563eb; } .btn-red { background:#ef4444; } .btn-green { background:#22c55e; }
.btn-blue:hover { background:#3b82f6; } .btn-red:hover { background:#f87171; } .btn-green:hover { background:#4ade80; }
.main-content { margin-left:220px; padding:1rem; min-height:100vh; }
.history-table-wrapper{ overflow-x:auto; -webkit-overflow-scrolling:touch; }
.table-sm th, .table-sm td { padding:2px 4px; font-size:11px; border:none; white-space: nowrap; text-align:center; }
body.dark .table-sm th, body.dark .table-sm td { color:white; background:transparent; }
@media(max-width:768px){
  .sidebar { width:80px; padding:0.5rem 0; }
  .sidebar a { justify-content:center; padding:10px 0; flex-direction:column; font-size:11px; }
  .sidebar h5 { display:none; }
  .sidebar img { display:block; width:50px; height:50px; margin:0 auto 10px; }
  .main-content { margin-left:80px; padding:0.5rem; }
  .card { font-size:12px; }
}
</style>
</head>
<body>

<div class="sidebar">
<img src="logo1.png" class="mb-3 mx-auto" style="border-radius:10px; height:50px; width:50px;">
<h5 class="text-center mb-3">JKM Prime Digital Prints</h5>
<nav class="nav flex-column">
<a class="nav-link active" href="index.html"><i class="bi bi-speedometer2 fs-5"></i><span class="d-none d-md-inline">Dashboard</span></a>
<a class="nav-link" onclick="toggleDark()"><i class="bi bi-moon-stars-fill fs-5"></i><span class="d-none d-md-inline">Dark Mode</span></a>
</nav>
</div>

<div class="main-content">
<div class="card p-3 mb-3">
<h5>Inventory Management</h5>
<div class="row g-2 mb-2">
  <div class="col-md-4">
    <select id="invCategory" class="form-select mb-1">
      <option value="">Select Category</option>
    </select>
    <input type="text" id="invItemName" placeholder="Item Name" class="form-control mb-1">
  </div>
  <div class="col-md-2">
    <input type="number" id="invStock" placeholder="Stock" class="form-control mb-1">
  </div>
  <div class="col-md-2">
    <input type="number" id="invUnitPrice" placeholder="Unit Price" class="form-control mb-1">
  </div>
  <div class="col-md-2">
    <button class="btn btn-blue btn-professional" onclick="addInventoryItem()">Add</button>
  </div>
</div>

<div class="history-table-wrapper">
<table class="table table-sm" id="inventoryTable">
<thead>
<tr>
<th>No</th><th>Category</th><th>Item</th><th>Stock</th><th>Unit Price</th><th>Actions</th>
</tr>
</thead>
<tbody id="inventoryBody"></tbody>
</table>
</div>
</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>
// Firebase Config
const firebaseConfig = {
  apiKey: "YOUR_FIREBASE_API_KEY",
  authDomain: "YOUR_FIREBASE_AUTH_DOMAIN",
  databaseURL: "https://jkm-printing-system-default-rtdb.firebaseio.com/",
  projectId: "your-project-id",
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// Dark mode
function toggleDark(){document.body.classList.toggle("dark");}

// Inventory categories
const categories = ["Photo Print","Rush ID","Printing","Customized T-Shirt","Customized Mug","Customized Tumbler","Others"];
const catSelect = document.getElementById("invCategory");
categories.forEach(c => catSelect.innerHTML += `<option value="${c}">${c}</option>`);

// Add Inventory Item
function addInventoryItem(){
  const category = document.getElementById("invCategory").value;
  const itemName = document.getElementById("invItemName").value;
  const stock = Number(document.getElementById("invStock").value);
  const unitPrice = Number(document.getElementById("invUnitPrice").value);

  if(!category || !itemName || !stock || !unitPrice){
    Swal.fire("Error","Please fill all fields","error");
    return;
  }

  db.ref('inventory').push({category,itemName,stock,unitPrice}).then(()=>{
    Swal.fire("Success","Item added to inventory","success");
    document.getElementById("invItemName").value="";
    document.getElementById("invStock").value="";
    document.getElementById("invUnitPrice").value="";
  });
}

// Update Inventory Table
function updateInventoryTable(){
  const tbody = document.getElementById("inventoryBody");
  db.ref('inventory').on('value', snapshot=>{
    const data = snapshot.val() || {};
    tbody.innerHTML = "";
    let i=1;
    Object.keys(data).forEach(key=>{
      const item = data[key];
      tbody.innerHTML += `<tr>
        <td>${i++}</td>
        <td>${item.category}</td>
        <td>${item.itemName}</td>
        <td>${item.stock}</td>
        <td>₱${item.unitPrice}</td>
        <td>
          <button class="btn btn-sm btn-blue" onclick="editInventory('${key}')">🖊️</button>
          <button class="btn btn-sm btn-red" onclick="deleteInventory('${key}')">✖</button>
        </td>
      </tr>`;
    });
  });
}
updateInventoryTable();

// Delete Inventory Item
function deleteInventory(id){
  Swal.fire({
    title:"Delete?",
    text:"Are you sure you want to delete this item?",
    icon:"warning",
    showCancelButton:true,
    confirmButtonText:"Yes"
  }).then(res=>{
    if(res.isConfirmed){
      db.ref('inventory/'+id).remove().then(()=>{
        Swal.fire("Deleted","Item removed","success");
      });
    }
  });
}

// Edit Inventory Item
function editInventory(id){
  db.ref('inventory/'+id).once('value', snapshot=>{
    const item = snapshot.val();
    Swal.fire({
      title:"Edit Inventory",
      html:`<input id="editCategory" value="${item.category}" class="swal2-input" placeholder="Category">
            <input id="editItemName" value="${item.itemName}" class="swal2-input" placeholder="Item Name">
            <input id="editStock" type="number" value="${item.stock}" class="swal2-input" placeholder="Stock">
            <input id="editUnitPrice" type="number" value="${item.unitPrice}" class="swal2-input" placeholder="Unit Price">`,
      showCancelButton:true,
      preConfirm:()=>{
        return {
          category: document.getElementById("editCategory").value,
          itemName: document.getElementById("editItemName").value,
          stock: Number(document.getElementById("editStock").value),
          unitPrice: Number(document.getElementById("editUnitPrice").value)
        };
      }
    }).then(res=>{
      if(res.isConfirmed){
        db.ref('inventory/'+id).update(res.value).then(()=>{
          Swal.fire("Updated","Item updated","success");
        });
      }
    });
  });
}
</script>

</body>
</html>
