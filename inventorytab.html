<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inventory Management - JKM PRIME DIGITAL PRINTS</title>
<link rel="icon" href="logo.png">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<style>
body { font-family:'Courier New', monospace; background:#eef2f7; color:#111; font-size:13px; margin:0; }
body.dark { background:#0f172a; color:white; }
.sidebar { display:none; } /* no sidebar in inventory tab */
.container { max-width:1200px; margin:auto; padding:1rem; }
.card { border-radius:10px; padding:15px; margin-bottom:15px; background:white; box-shadow:0 2px 8px rgba(0,0,0,0.1); }
body.dark .card { background:#1e293b; color:white; }
.table-sm th, .table-sm td { font-size:12px; text-align:center; }
input, select { font-size:13px; }
.btn-professional { font-weight:600; border-radius:6px; padding:5px 10px; font-size:13px; }
.header { display:flex; justify-content:space-between; align-items:center; margin-bottom:15px; }
.header img { height:50px; width:50px; border-radius:10px; }
</style>
</head>
<body>
<div class="container">

<div class="header">
  <div class="d-flex align-items-center gap-2">
    <img src="logo.png" alt="Logo">
    <h4>JKM PRIME DIGITAL PRINTS - Inventory</h4>
  </div>
  <button class="btn btn-primary btn-professional" onclick="window.location='index.html'"><i class="bi bi-arrow-left"></i> Back to Dashboard</button>
</div>

<div class="card">
  <h5>Add / Update Material</h5>
  <div class="row g-2">
    <div class="col-md-3">
      <select id="itemCategory" class="form-select">
        <option value="">Select Category</option>
      </select>
    </div>
    <div class="col-md-3">
      <select id="itemName" class="form-select">
        <option value="">Select Item</option>
      </select>
    </div>
    <div class="col-md-2">
      <input type="text" id="materialName" class="form-control" placeholder="Material Name">
    </div>
    <div class="col-md-2">
      <input type="text" id="materialSize" class="form-control" placeholder="Size/Type">
    </div>
    <div class="col-md-2">
      <input type="number" id="materialStock" class="form-control" placeholder="Stock Qty">
    </div>
  </div>
  <div class="mt-2">
    <button class="btn btn-success btn-professional" onclick="addMaterial()">Add Material</button>
  </div>
</div>

<div class="card">
  <h5>Inventory List</h5>
  <div class="table-responsive">
    <table class="table table-sm" id="inventoryTable">
      <thead>
        <tr>
          <th>Category</th>
          <th>Item</th>
          <th>Material</th>
          <th>Size/Type</th>
          <th>Stock</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody>
        <!-- Materials will populate here -->
      </tbody>
    </table>
  </div>
</div>

</div>

<script>
//================= Firebase Config =================
const firebaseConfig = {
  apiKey: "YOUR_FIREBASE_API_KEY",
  authDomain: "YOUR_FIREBASE_AUTH_DOMAIN",
  databaseURL: "https://jkm-printing-system-default-rtdb.firebaseio.com/",
  projectId: "your-project-id",
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

//================= Categories & Items ==============
const categories = {
  "Photo Print":["3R Photo Print","4R Photo Print","5R Photo Print","A4 Photo Print","Polaroid Photo Print"],
  "Rush ID":["Rush ID Package 1","Rush ID Package 2","Rush ID Package 3"],
  "Printing":["Document Print Short","Document Print A4","Document Print Long"],
  "Customized T-Shirt":["T-Shirt Small","T-Shirt Medium","T-Shirt Large","T-Shirt XL"],
  "Customized Mug":["White Mug","Magic Mug"],
  "Customized Tumbler":["Regular Tumbler","Premium Tumbler"],
  "Others":["Desk Calendar","A4 Sintra Board","A3 Sintra Board","Ref Magnet","Totebag"]
};

// Populate category select
const catSelect = document.getElementById("itemCategory");
Object.keys(categories).forEach(c => {
  catSelect.innerHTML += `<option value="${c}">${c}</option>`;
});

// Update item select on category change
catSelect.addEventListener("change",()=>{
  const cat = catSelect.value;
  const itemSelect = document.getElementById("itemName");
  itemSelect.innerHTML = '<option value="">Select Item</option>';
  if(categories[cat]){
    categories[cat].forEach(i=>{
      itemSelect.innerHTML += `<option value="${i}">${i}</option>`;
    });
  }
});

//================= Inventory Functions ===============
function addMaterial(){
  const category = document.getElementById("itemCategory").value;
  const item = document.getElementById("itemName").value;
  const material = document.getElementById("materialName").value.trim();
  const size = document.getElementById("materialSize").value.trim();
  const stock = Number(document.getElementById("materialStock").value);
  if(!category||!item||!material||!stock){Swal.fire("Error","Fill all fields","error"); return;}

  const newMaterialRef = db.ref('inventory').push();
  newMaterialRef.set({category,item,material,size,stock});
  
  Swal.fire("Added","Material added to inventory","success");
  clearInputs();
  updateInventoryTable();
}

function clearInputs(){
  document.getElementById("materialName").value='';
  document.getElementById("materialSize").value='';
  document.getElementById("materialStock").value='';
}

//================= Render Inventory Table =================
function updateInventoryTable(){
  const tbody = document.querySelector("#inventoryTable tbody");
  tbody.innerHTML="";
  db.ref('inventory').once('value',snapshot=>{
    const data = snapshot.val()||{};
    Object.keys(data).forEach(id=>{
      const m = data[id];
      const tr = document.createElement("tr");
      tr.innerHTML=`
        <td>${m.category}</td>
        <td>${m.item}</td>
        <td>${m.material}</td>
        <td>${m.size}</td>
        <td>${m.stock}</td>
        <td>
          <button class="btn btn-sm btn-warning" onclick="editMaterial('${id}')">Edit</button>
          <button class="btn btn-sm btn-danger" onclick="deleteMaterial('${id}')">Delete</button>
        </td>`;
      tbody.appendChild(tr);
    });
  });
}

//================= Edit/Delete Functions ===============
function deleteMaterial(id){
  Swal.fire({title:"Delete?",text:"Are you sure?",icon:"warning",showCancelButton:true,confirmButtonText:"Yes"}).then(res=>{
    if(res.isConfirmed){
      db.ref('inventory/'+id).remove();
      updateInventoryTable();
      Swal.fire("Deleted","Material removed","success");
    }
  });
}

function editMaterial(id){
  db.ref('inventory/'+id).once('value',snapshot=>{
    const m = snapshot.val();
    Swal.fire({
      title:"Edit Material",
      html:`<input id="swalCategory" class="swal2-input" placeholder="Category" value="${m.category}">
            <input id="swalItem" class="swal2-input" placeholder="Item" value="${m.item}">
            <input id="swalMaterial" class="swal2-input" placeholder="Material Name" value="${m.material}">
            <input id="swalSize" class="swal2-input" placeholder="Size/Type" value="${m.size}">
            <input id="swalStock" type="number" class="swal2-input" placeholder="Stock" value="${m.stock}">`,
      focusConfirm:false,
      showCancelButton:true,
      preConfirm:()=>{
        return {
          category: document.getElementById("swalCategory").value,
          item: document.getElementById("swalItem").value,
          material: document.getElementById("swalMaterial").value,
          size: document.getElementById("swalSize").value,
          stock: Number(document.getElementById("swalStock").value)
        }
      }
    }).then(res=>{
      if(res.isConfirmed){
        db.ref('inventory/'+id).update(res.value);
        updateInventoryTable();
        Swal.fire("Updated","Material updated","success");
      }
    });
  });
}

//================= Deduct Material on Order =================
// Example: call this after saving a receipt
function deductMaterialsOnOrder(itemName, qty){
  db.ref('inventory').once('value',snapshot=>{
    const data = snapshot.val()||{};
    Object.keys(data).forEach(id=>{
      const m = data[id];
      if(m.item === itemName){
        let newStock = m.stock - qty;
        if(newStock<0) newStock=0;
        db.ref('inventory/'+id).update({stock:newStock});
      }
    });
    updateInventoryTable();
  });
}

// Initial load
updateInventoryTable();

  // Check if user is logged in
  if(localStorage.getItem('isLoggedIn') !== 'true') {
    // If not logged in, redirect to login (index.html)
    window.location.href = 'index.html';
  }

</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
